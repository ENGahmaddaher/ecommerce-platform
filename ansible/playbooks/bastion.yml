---
- name: Configure Bastion Host
  hosts: bastion
  become: yes
  roles:
    - common
    - docker
  tasks:
    - name: Install monitoring tools
      apt:
        name:
          - htop
          - iotop
          - nload
          - tmux
          - git
          - vim
          - curl
          - wget
          - jq
          - awscli
        state: present
        update_cache: yes

    - name: Configure SSH security
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^MaxAuthTries', line: 'MaxAuthTries 3' }
      notify: restart sshd

    - name: Create admin user
      user:
        name: admin
        groups: sudo
        shell: /bin/bash
        append: yes

    - name: Configure MOTD
      copy:
        content: |
          ==========================================
          Bastion Host - {{ environment }}
          Authorized access only
          ==========================================
        dest: /etc/motd

    - name: Enable firewall
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: [22, 80, 443]

    - name: Enable ufw
      ufw:
        state: enabled
        policy: deny

  handlers:
    - name: restart sshd
      service:
        name: ssh
        state: restarted
