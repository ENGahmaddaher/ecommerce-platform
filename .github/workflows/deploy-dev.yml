name: Deploy to Development

on:
  push:
    branches:
      - develop
    paths:
      - 'app/**'
      - 'terraform/environments/dev/**'
  workflow_dispatch: 

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: dev
  APP_NAME: ecommerce

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Backend image
        run: |
          cd app/backend
          docker build -t ${{ env.APP_NAME }}-backend:${{ github.sha }} .
          docker tag ${{ env.APP_NAME }}-backend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}-backend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}-backend:${{ github.sha }}

      - name: Build and push Frontend image
        run: |
          cd app/frontend
          docker build -t ${{ env.APP_NAME }}-frontend:${{ github.sha }} .
          docker tag ${{ env.APP_NAME }}-frontend:${{ github.sha }} ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}-frontend:${{ github.sha }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}-frontend:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: cd terraform/environments/${{ env.ENVIRONMENT }} && terraform init

      - name: Terraform Apply
        run: |
          cd terraform/environments/${{ env.ENVIRONMENT }}
          terraform apply -auto-approve \
            -var="backend_image_tag=${{ github.sha }}" \
            -var="frontend_image_tag=${{ github.sha }}"

      - name: Health Check
        run: ./scripts/health-check.sh ${{ env.ENVIRONMENT }}

      - name: Notify Slack (optional)
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "Deployment to ${{ env.ENVIRONMENT }}"
          SLACK_MESSAGE: "Status: ${{ job.status }}\nCommit: ${{ github.sha }}\nEnvironment: ${{ env.ENVIRONMENT }}"
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
